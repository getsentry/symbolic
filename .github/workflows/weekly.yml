name: Weekly CI

on:
  schedule:
    - cron: "0 0 * * 1" # every monday at 00:00
  workflow_dispatch:

env:
  RUSTFLAGS: -Dwarnings

jobs:
  weekly-ci:
    strategy:
      fail-fast: false
      matrix:
        rust: [nightly, beta]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install rust stable toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component clippy --no-self-update
          rustup default ${{ matrix.rust }}

      - run: cargo clippy --all-features --workspace --tests --examples -- -D clippy::all

      - run: cargo test --workspace --all-features --all-targets
      - run: cargo test --workspace --all-features --doc

  weekly-audit:
    name: Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      # FIXME: find a maintained alternative to audit-check
      - uses: actions-rs/audit-check@24a24e9d5c8179709dd1ad4d7ba661572de756e6 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
